services:
  expo-app:
    build: .
    container_name: evaluacion1806
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - NODE_ENV=development
      - EXPO_DEV_PORT=8081
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.137.213
    stdin_open: true
    tty: true